[skill]
id = "com.abigail.skills.web-search"
name = "Web Search"
version = "0.1.0"
description = "Search the web using Tavily API"
category = "Sensory"
keywords = ["search", "web", "tavily"]

[author]
name = "Abigail Team"

[runtime]
runtime = "Native"
min_abigail_version = "0.1.0"
platforms = ["Windows", "macOS", "Linux"]

[[permissions]]
permission = { Network = { Domains = ["api.tavily.com"] } }
reason = "Tavily web search API"

[[secrets]]
name = "tavily"
description = "Tavily API key (get one at app.tavily.com)"
required = true
