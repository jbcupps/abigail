[skill]
id = "com.abigail.skills.perplexity-search"
name = "Perplexity Search"
version = "0.1.0"
description = "AI-powered web search with citations via Perplexity Sonar API"
category = "Sensory"
keywords = ["search", "web", "perplexity", "research", "citations"]

[author]
name = "Abigail Team"

[runtime]
runtime = "Native"
min_abigail_version = "0.1.0"
platforms = ["Windows", "macOS", "Linux"]

[[permissions]]
permission = { Network = { Domains = ["api.perplexity.ai"] } }
reason = "Perplexity Sonar search API"

[[secrets]]
name = "perplexity"
description = "Perplexity API key (get one at perplexity.ai/settings/api)"
required = true
