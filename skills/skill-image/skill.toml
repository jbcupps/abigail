[skill]
id = "com.abigail.skills.image"
name = "Image"
version = "0.1.0"
description = "Image processing: get info, resize, and convert between formats"
category = "Utility"
keywords = ["image", "picture", "resize", "convert", "photo"]

[author]
name = "Abigail Team"

[runtime]
