# Generic IMAP/SMTP email skill (abigail-skills transport layer).

[skill]
id = "com.abigail.skills.email"
name = "Email"
version = "0.1.0"
description = "Email via IMAP/SMTP: fetch, send, and manage mail with any compatible server."
category = "Communication"
keywords = ["email", "imap", "smtp", "inbox"]

[runtime]
runtime = "Native"
min_abigail_version = "0.1.0"
platforms = ["Windows", "macOS", "Linux"]

[[capabilities]]
capability = "email_transport"
version = "1.0"

[[permissions]]
permission = { Network = "Full" }
reason = "IMAP and SMTP server depends on user configuration"

[[secrets]]
name = "imap_password"
description = "App password or account password for IMAP login"
required = true

[[secrets]]
name = "imap_user"
description = "IMAP username / email address"
required = true

[[secrets]]
name = "imap_host"
description = "IMAP server hostname (required — no default)"
required = true

[[secrets]]
name = "imap_port"
description = "IMAP server port (default: 993)"
required = false

[[secrets]]
name = "imap_tls_mode"
description = "TLS mode: IMPLICIT (default) or STARTTLS"
required = false

[[secrets]]
name = "smtp_host"
description = "SMTP server hostname (required — no default)"
required = true

[[secrets]]
name = "smtp_port"
description = "SMTP server port (default: 587)"
required = false

[[secrets]]
name = "smtp_user"
description = "SMTP username / email address (defaults to imap_user when omitted)"
required = false

[[secrets]]
name = "smtp_password"
description = "SMTP password (defaults to imap_password when omitted)"
required = false

[[secrets]]
name = "smtp_tls_mode"
description = "TLS mode: STARTTLS (default) or IMPLICIT"
required = false

[config]
defaults = { imap_port = 993, smtp_port = 587 }
