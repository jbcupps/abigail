[package]
name = "ao-app"
version.workspace = true
edition.workspace = true

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
ao-core = { path = "../crates/ao-core" }
base64 = "0.21"
ed25519-dalek.workspace = true
ao-memory = { path = "../crates/ao-memory" }
ao-capabilities = { path = "../crates/ao-capabilities" }
ao-router = { path = "../crates/ao-router" }
ao-birth = { path = "../crates/ao-birth" }
ao-skills = { path = "../crates/ao-skills" }
skill-web-search = { path = "../skills/skill-web-search" }
tauri = { version = "2.0", features = ["tray-icon"] }
tauri-plugin-dialog = "2.0"
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
reqwest = { version = "0.11", features = ["json"] }
regex = "1"
chrono.workspace = true

[lib]
crate-type = ["staticlib", "cdylib", "rlib"]
