name: Release Fast (Alpha Windows + Linux)

env:
  OLLAMA_VERSION: "v0.5.13"

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 0.0.3). Leave empty for auto-increment.'
        required: false
        type: string
      create_github_release:
        description: 'Create a GitHub pre-release with the built artifacts'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            installer_path: target/release/bundle/nsis/*.exe
            asset_name: Abigail-windows-x64-setup.exe
            asset_glob: "*.exe"
            keygen_bin: abigail-keygen.exe
            resource_name: abigail-keygen.exe
            ollama_bin: ollama.exe

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            installer_path: target/release/bundle/deb/*.deb
            asset_name: Abigail-linux-x64.deb
            asset_glob: "*.deb"
            keygen_bin: abigail-keygen
            resource_name: abigail-keygen
            ollama_bin: ollama

    runs-on: ${{ matrix.platform }}

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install nsis --no-progress -y

      - name: Install Linux dependencies (Tauri 2 / Debian)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/src-ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.release_version }}" ]]; then
            VERSION="${{ github.event.inputs.release_version }}"
          else
            git fetch --tags
            # Only consider clean semver tags (exclude -fast, -rc, etc.)
            LATEST=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
            if [[ -z "$LATEST" ]]; then
              VERSION="0.0.1"
            else
              LATEST_VER="${LATEST#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VER"
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          TAG="v${VERSION}-fast.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Fast build version: $VERSION (tag: $TAG)"

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          cd tauri-app
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            conf.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Disable beforeBuildCommand for CI
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const path = 'tauri-app/tauri.conf.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            data.build = data.build || {};
            data.build.beforeBuildCommand = '';
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
          "

      - name: Set platform-specific resources in tauri.conf.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const path = 'tauri-app/tauri.conf.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            data.bundle = data.bundle || {};
            data.bundle.resources = ['${{ matrix.resource_name }}', '${{ matrix.ollama_bin }}'];
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
          "

      - name: Resolve fast-release signing mode
        if: matrix.platform == 'windows-latest' && github.event.inputs.create_github_release == 'true'
        id: fast_signing
        shell: bash
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          has_windows_signing=false
          if [[ -n "${WINDOWS_SIGNING_CERT_BASE64:-}" && \
                -n "${WINDOWS_SIGNING_CERT_PASSWORD:-}" && \
                -n "${WINDOWS_CERTIFICATE_THUMBPRINT:-}" && \
                -n "${WINDOWS_TIMESTAMP_URL:-}" ]]; then
            has_windows_signing=true
          fi

          echo "has_windows_signing=$has_windows_signing" >> "$GITHUB_OUTPUT"

          if [[ "$has_windows_signing" == "true" ]]; then
            echo "Windows Authenticode inputs detected for fast pre-release."
          else
            echo "Windows Authenticode inputs missing; fast pre-release will publish unsigned Windows installers."
          fi

      - name: Enforce fast-release signing prerequisites
        if: matrix.platform == 'windows-latest' && github.event.inputs.create_github_release == 'true'
        shell: bash
        env:
          ABIGAIL_REQUIRE_UPDATER_SIGNING: "true"
          ABIGAIL_REQUIRE_WINDOWS_SIGNING: ${{ steps.fast_signing.outputs.has_windows_signing }}
          ABIGAIL_REQUIRE_MAC_SIGNING: "false"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          bash scripts/enforce_release_prereqs.sh

      - name: Configure updater and signing fields in tauri.conf.json
        shell: bash
        env:
          ABIGAIL_REQUIRE_UPDATER_PUBKEY: ${{ matrix.platform == 'windows-latest' && github.event.inputs.create_github_release == 'true' }}
          ABIGAIL_ENABLE_UPDATER_ARTIFACTS: ${{ matrix.platform == 'windows-latest' && github.event.inputs.create_github_release == 'true' }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          node scripts/prepare_tauri_bundle_config.mjs tauri-app/tauri.conf.json

      - name: Assert updater config injection
        if: matrix.platform == 'windows-latest' && github.event.inputs.create_github_release == 'true'
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          node -e "
            const fs = require('fs');
            const normalize = (value) => {
              const input = String(value || '').trim();
              if (!input) return '';
              if (!input.startsWith('untrusted comment:')) {
                return input.replace(/\s+/g, '');
              }
              const lines = input.split(/\r?\n/).filter(Boolean);
              return Buffer.from(`${lines[0]}\n${lines[1]}`, 'utf8').toString('base64');
            };
            const conf = JSON.parse(fs.readFileSync('tauri-app/tauri.conf.json', 'utf8'));
            if (!conf.bundle?.createUpdaterArtifacts) {
              throw new Error('createUpdaterArtifacts must be true for fast prerelease builds');
            }
            if (conf.plugins?.updater?.pubkey !== normalize(process.env.TAURI_UPDATER_PUBKEY)) {
              throw new Error('Updater pubkey injection mismatch');
            }
          "

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Rust cache
        uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: "."
          shared-key: release-fast-${{ matrix.platform }}

      - name: Install and build frontend
        run: |
          cd tauri-app/src-ui && npm ci && npm run build

      - name: Generate app icons
        run: |
          npm install -g @tauri-apps/cli@v2
          cd tauri-app && tauri icon icons/icon.png -o icons

      - name: Ensure icons at repo root (bundler cwd workaround)
        shell: bash
        run: |
          mkdir -p icons
          cp tauri-app/icons/icon.ico icons/ 2>/dev/null || true
          cp tauri-app/icons/icon.icns icons/ 2>/dev/null || true
          cp tauri-app/icons/*.png icons/ 2>/dev/null || true

      - name: Build abigail-keygen binary
        shell: bash
        run: |
          cargo build --release -p abigail-keygen
          cp target/release/${{ matrix.keygen_bin }} tauri-app/${{ matrix.resource_name }}

      - name: Download bundled Ollama binary
        shell: bash
        run: |
          OLLAMA_BASE="https://github.com/ollama/ollama/releases/download/${{ env.OLLAMA_VERSION }}"
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            curl -fL -o /tmp/ollama.zip "${OLLAMA_BASE}/ollama-windows-amd64.zip"
            unzip -o -j /tmp/ollama.zip "ollama.exe" -d tauri-app/
          elif [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            curl -fL -o /tmp/ollama.tgz "${OLLAMA_BASE}/ollama-linux-amd64.tgz"
            tar xzf /tmp/ollama.tgz -C tauri-app/ --strip-components=1 bin/ollama
            chmod +x "tauri-app/${{ matrix.ollama_bin }}"
          fi
          ls -la "tauri-app/${{ matrix.ollama_bin }}"
          # Validate binary is not a truncated download or error page
          FILE_SIZE=$(stat -c%s "tauri-app/${{ matrix.ollama_bin }}" 2>/dev/null || stat -f%z "tauri-app/${{ matrix.ollama_bin }}" 2>/dev/null)
          if [ "$FILE_SIZE" -lt 10000000 ]; then
            echo "ERROR: Downloaded Ollama binary is too small (${FILE_SIZE} bytes)"
            exit 1
          fi

      - name: Import Windows code signing certificate
        if: matrix.platform == 'windows-latest' && github.event.inputs.create_github_release == 'true' && steps.fast_signing.outputs.has_windows_signing == 'true'
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'abigail-fast-signing-cert.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64))
          $password = ConvertTo-SecureString -String $env:WINDOWS_SIGNING_CERT_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $certPath -Password $password -CertStoreLocation Cert:\CurrentUser\My | Out-Null
          $cert = Get-ChildItem Cert:\CurrentUser\My | Where-Object { $_.Thumbprint -eq $env:WINDOWS_CERTIFICATE_THUMBPRINT }
          if (-not $cert) {
            throw "Imported Windows signing certificate with thumbprint $env:WINDOWS_CERTIFICATE_THUMBPRINT was not found in Cert:\CurrentUser\My"
          }

      - name: Validate updater signing key preflight
        if: matrix.platform == 'windows-latest' && github.event.inputs.create_github_release == 'true'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          bash scripts/validate_tauri_signing_key.sh

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd tauri-app

          if [[ "${{ matrix.platform }}" == "windows-latest" && "${{ github.event.inputs.create_github_release }}" == "true" ]]; then
            tauri build
          elif [[ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "Signing key detected: building signed artifacts"
            tauri build
          else
            echo "WARNING: TAURI_SIGNING_PRIVATE_KEY is not configured; building unsigned artifacts"
            TAURI_SKIP_SIGNING=true tauri build
          fi

      - name: Verify updater artifacts
        if: matrix.platform == 'windows-latest' && github.event.inputs.create_github_release == 'true'
        shell: bash
        run: |
          mapfile -t UPDATER_FILES < <(find target -type f \( -name "*.nsis.zip" -o -name "*.nsis.zip.sig" -o -name "*.msi.zip" -o -name "*.msi.zip.sig" \))
          if [[ "${#UPDATER_FILES[@]}" -eq 0 ]]; then
            echo "ERROR: No updater artifacts were produced."
            exit 1
          fi

      - name: Upload installers (Artifacts)
        uses: actions/upload-artifact@47309c993abb98030a35d55ef7ff34b7fa1074b5 # v4
        with:
          name: abigail-fast-installer-${{ matrix.platform }}
          path: ${{ matrix.installer_path }}
          if-no-files-found: error

      - name: Upload MSI installer (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@47309c993abb98030a35d55ef7ff34b7fa1074b5 # v4
        with:
          name: abigail-fast-msi-windows-latest
          path: target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload updater artifacts
        if: matrix.platform == 'windows-latest' && github.event.inputs.create_github_release == 'true'
        uses: actions/upload-artifact@47309c993abb98030a35d55ef7ff34b7fa1074b5 # v4
        with:
          name: abigail-fast-updater-windows-latest
          path: |
            target/**/bundle/**/*.nsis.zip
            target/**/bundle/**/*.nsis.zip.sig
            target/**/bundle/**/*.msi.zip
            target/**/bundle/**/*.msi.zip.sig
          if-no-files-found: error

  publish:
    needs: build
    if: github.event.inputs.create_github_release == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Download all installer artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: abigail-fast-installer-*
          merge-multiple: false

      - name: Download MSI artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: abigail-fast-msi-*
          merge-multiple: false
        continue-on-error: true

      - name: Download updater artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: abigail-fast-updater-*
          merge-multiple: false
        continue-on-error: true

      - name: Count downloaded installer artifacts
        id: artifacts
        shell: bash
        run: |
          if [ -d artifacts ]; then
            COUNT=$(find artifacts -type f | wc -l | tr -d ' ')
          else
            COUNT=0
          fi
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Discovered $COUNT downloaded artifact file(s)"

      - name: Create git tag if needed
        if: steps.artifacts.outputs.count != '0'
        shell: bash
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Rename to stable asset names for download URLs
        if: steps.artifacts.outputs.count != '0'
        shell: bash
        run: |
          find artifacts -type f -name '*.exe' -print -quit | while read -r f; do cp "$f" Abigail-windows-x64-setup-fast.exe; done
          find artifacts -type f -name '*.deb' -print -quit | while read -r f; do cp "$f" Abigail-linux-x64-fast.deb; done
          find artifacts -type f -name '*.msi' -print -quit | while read -r f; do cp "$f" Abigail-windows-x64-fast.msi; done
          find artifacts/abigail-fast-updater-windows-latest -type f -name '*.nsis.zip' -print -quit | while read -r f; do cp "$f" Abigail-updater-windows-x64.nsis.zip; done
          find artifacts/abigail-fast-updater-windows-latest -type f -name '*.nsis.zip.sig' -print -quit | while read -r f; do cp "$f" Abigail-updater-windows-x64.nsis.zip.sig; done
          find artifacts/abigail-fast-updater-windows-latest -type f -name '*.msi.zip' -print -quit | while read -r f; do cp "$f" Abigail-updater-windows-x64.msi.zip; done
          find artifacts/abigail-fast-updater-windows-latest -type f -name '*.msi.zip.sig' -print -quit | while read -r f; do cp "$f" Abigail-updater-windows-x64.msi.zip.sig; done
          node scripts/generate_tauri_latest_manifest.mjs \
            --version "${{ needs.build.outputs.version }}" \
            --assets-dir . \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${{ needs.build.outputs.tag }}" \
            --output latest.json

      - name: Create GitHub Pre-release
        if: steps.artifacts.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=()
          [[ -f Abigail-windows-x64-setup-fast.exe ]] && assets+=(Abigail-windows-x64-setup-fast.exe)
          [[ -f Abigail-linux-x64-fast.deb ]] && assets+=(Abigail-linux-x64-fast.deb)
          [[ -f Abigail-windows-x64-fast.msi ]] && assets+=(Abigail-windows-x64-fast.msi)
          [[ -f Abigail-updater-windows-x64.nsis.zip ]] && assets+=(Abigail-updater-windows-x64.nsis.zip)
          [[ -f Abigail-updater-windows-x64.nsis.zip.sig ]] && assets+=(Abigail-updater-windows-x64.nsis.zip.sig)
          [[ -f Abigail-updater-windows-x64.msi.zip ]] && assets+=(Abigail-updater-windows-x64.msi.zip)
          [[ -f Abigail-updater-windows-x64.msi.zip.sig ]] && assets+=(Abigail-updater-windows-x64.msi.zip.sig)
          [[ -f latest.json ]] && assets+=(latest.json)

          gh release create "${{ needs.build.outputs.tag }}" \
            --title "Abigail Fast ${{ needs.build.outputs.version }}" \
            --notes "Alpha validation release. Windows updater payloads remain signed; Windows Authenticode is included only when certificate secrets are configured." \
            --prerelease \
            "${assets[@]}"
