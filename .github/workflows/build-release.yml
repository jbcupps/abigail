# Build Abby (Tauri app) and publish to GitHub Releases on version tags.
# See: https://tauri.app/distribute/pipelines/github/

name: build-release

on:
  push:
    tags:
      - 'v*' # Only run on version tags (e.g., v0.1.0)
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 0.0.1). Leave empty to build only, no release.'
        required: false
        type: string

permissions:
  contents: write # Required to create Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc
            installer_path: target/release/bundle/nsis/*.exe
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu
            installer_path: target/release/bundle/deb/*.deb
          - platform: macos-latest
            args: ""
            target: x86_64-apple-darwin
            installer_path: target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/src-ui/package.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install and build frontend
        run: |
          cd tauri-app/src-ui && npm install && npm run build

      - name: Generate app icons
        run: |
          npm install -g @tauri-apps/cli@v2
          cd tauri-app && tauri icon icons/icon.png -o icons

      - name: Ensure icons at repo root (Windows bundler cwd)
        if: matrix.platform == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path icons | Out-Null
          Copy-Item tauri-app\icons\icon.ico -Destination icons\
          Copy-Item tauri-app\icons\icon.icns -Destination icons\ -ErrorAction SilentlyContinue
          Copy-Item tauri-app\icons\*.png -Destination icons\ -ErrorAction SilentlyContinue

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@063c0231f444e55760d98acb9c469b994269d4a5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          args: ${{ matrix.args }}

      - name: Upload installers (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: abby-installer-${{ matrix.platform }}
          path: ${{ matrix.installer_path }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_version != '')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: abby-installer-*
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', github.event.inputs.release_version) }}
          name: Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', github.event.inputs.release_version) }}
          draft: true
          prerelease: false
          files: |
            artifacts/abby-installer-windows-latest/*.exe
            artifacts/abby-installer-ubuntu-22.04/*.deb
            artifacts/abby-installer-macos-latest/*.dmg
