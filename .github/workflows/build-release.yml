# Build AO (Tauri app + keygen) and publish to GitHub Releases.
#
# Triggers:
# - Every push to main (auto-increments v* patch version)
# - Tags matching 'v*' (e.g., v0.0.3) for explicit versions
# - Manual workflow_dispatch
#
# Auto-versioning: on each main push, fetches all v* tags, increments
# the patch number, and creates a new release.

name: build-release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'main'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 0.0.3). Leave empty for auto-increment.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc
            installer_path: target/release/bundle/nsis/*.exe
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu
            installer_path: target/release/bundle/deb/*.deb
          - platform: macos-latest
            args: ""
            target: x86_64-apple-darwin
            installer_path: target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install dependencies (Windows only)
        if: matrix.platform == 'windows-latest'
        run: choco install nsis --no-progress -y

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/src-ui/package.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Explicit tag push
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.release_version }}" ]]; then
            # Manual dispatch with explicit version
            VERSION="${{ github.event.inputs.release_version }}"
            TAG="v${VERSION}"
          else
            # Auto-increment: find latest v* tag and bump patch
            git fetch --tags
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
            if [[ -z "$LATEST" ]]; then
              VERSION="0.0.1"
            else
              LATEST_VER="${LATEST#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VER"
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (tag: $TAG)"

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          cd tauri-app
          if command -v jq &> /dev/null; then
            jq '.version = "${{ steps.version.outputs.version }}"' tauri.conf.json > tauri.conf.json.tmp
            mv tauri.conf.json.tmp tauri.conf.json
          else
            sed -i.bak 's/"version": "[^"]*"/"version": "${{ steps.version.outputs.version }}"/' tauri.conf.json
            rm -f tauri.conf.json.bak
          fi
          cat tauri.conf.json | head -10

      - name: Disable beforeBuildCommand for CI
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'tauri-app/tauri.conf.json';
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          data.build = data.build || {};
          data.build.beforeBuildCommand = "";
          fs.writeFileSync(path, JSON.stringify(data, null, 2) + "\n");
          NODE

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install and build frontend
        run: |
          cd tauri-app/src-ui && npm install && npm run build

      - name: Generate app icons
        run: |
          npm install -g @tauri-apps/cli@v2
          cd tauri-app && tauri icon icons/icon.png -o icons

      - name: Ensure icons at repo root (Windows bundler cwd)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path icons | Out-Null
          Copy-Item tauri-app\icons\icon.ico -Destination icons\
          Copy-Item tauri-app\icons\icon.icns -Destination icons\ -ErrorAction SilentlyContinue
          Copy-Item tauri-app\icons\*.png -Destination icons\ -ErrorAction SilentlyContinue

      - name: Build ao-keygen binary
        shell: bash
        run: |
          cargo build --release -p ao-keygen
          cp target/release/ao-keygen.exe tauri-app/ao-keygen.exe || \
          cp target/release/ao-keygen tauri-app/ao-keygen || true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@063c0231f444e55760d98acb9c469b994269d4a5 # v0.5.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          args: ${{ matrix.args }}

      - name: Upload installers (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: ao-installer-${{ matrix.platform }}
          path: ${{ matrix.installer_path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout (for tagging)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ao-installer-*
          merge-multiple: false

      - name: Create git tag if needed
        shell: bash
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Rename to stable asset names for download URLs
        run: |
          mkdir -p release-assets

          # Windows
          INSTALLER=$(find artifacts/ao-installer-windows-latest -name "*.exe" -type f | head -1)
          if [ -n "$INSTALLER" ]; then
            cp "$INSTALLER" release-assets/AO-windows-x64-setup.exe
          fi

          # Linux
          INSTALLER=$(find artifacts/ao-installer-ubuntu-22.04 -name "*.deb" -type f | head -1)
          if [ -n "$INSTALLER" ]; then
            cp "$INSTALLER" release-assets/AO-linux-x64.deb
          fi

          # macOS
          INSTALLER=$(find artifacts/ao-installer-macos-latest -name "*.dmg" -type f | head -1)
          if [ -n "$INSTALLER" ]; then
            cp "$INSTALLER" release-assets/AO-macos-x64.dmg
          fi

          echo "Release assets:"
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: AO ${{ needs.build.outputs.tag }}
          draft: false
          prerelease: false
          body: |
            ## AO ${{ needs.build.outputs.tag }}

            ### Installation

            Download the installer for your platform:
            - **Windows**: `AO-windows-x64-setup.exe`
            - **Linux**: `AO-linux-x64.deb`
            - **macOS**: `AO-macos-x64.dmg`

            ### First Run Setup

            On first launch, AO will:
            1. Generate a signing keypair for verifying document integrity
            2. **Present your private key** - you MUST save this securely
            3. Run integrity checks and complete the birth sequence

            ### Security Note

            The private key shown during first run is NEVER stored by AO.
            Keep it safe - you'll need it if you ever need to verify your AO instance
            or recover from data loss.

            See [SECURITY_NOTES.md](https://github.com/${{ github.repository }}/blob/main/documents/SECURITY_NOTES.md) for details.
          files: |
            release-assets/*
