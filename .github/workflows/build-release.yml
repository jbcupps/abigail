# Build Abby (Tauri app) as install packages on push to master.
# Artifacts only; no GitHub Release. See plan and Tauri docs:
# https://tauri.app/distribute/pipelines/github/

name: build-release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/src-ui/package.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install and build frontend
        run: |
          cd tauri-app/src-ui && npm install && npm run build

      - name: Generate app icons
        run: |
          npm install -g @tauri-apps/cli@v2
          cd tauri-app && tauri icon icons/icon.png -o icons

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@063c0231f444e55760d98acb9c469b994269d4a5
        with:
          projectPath: tauri-app
          args: ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: abby-installer-${{ matrix.platform }}
          path: target/release/bundle/
