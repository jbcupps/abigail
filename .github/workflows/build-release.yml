# Build Abby (Tauri app) as install packages on push to master.
# Artifacts only; no GitHub Release. See plan and Tauri docs:
# https://tauri.app/distribute/pipelines/github/

name: build-release

on:
  push:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: tauri-app/src-ui/package.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install and build frontend
        run: |
          cd tauri-app/src-ui && npm install && npm run build

      - name: Build Tauri app
        # Use @dev so action installs @tauri-apps/cli@v2; @v0 installs v1 and rejects Tauri 2 config.
        uses: tauri-apps/tauri-action@dev
        with:
          projectPath: tauri-app
          args: ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: abby-installer-${{ matrix.platform }}
          path: target/release/bundle/
