name: CI

on:
  push:
    branches: [ "main", "dev-split" ]
  pull_request:
    branches: [ "main", "dev-split" ]

jobs:
  workspace-check:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check workspace
        run: cargo check --workspace
