# Unified CI quality gate.
#
# Runs 5 parallel jobs on push to main and PRs. CodeQL also runs weekly.
# The "gate" job requires lint, test, and frontend to pass; audit and CodeQL
# are advisory. Configure branch protection to require the "gate" check.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 0'  # Weekly on Sunday at 04:17 UTC (CodeQL)

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -- Lint ----------------------------------------------------------------
  # Checks formatting, clippy, and abigail-app compilation.
  lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude abigail-app -- -D warnings

      # abigail-app is excluded from clippy/test because it needs Tauri and
      # platform GUI libs to link.  A plain `cargo check` still catches type
      # errors, lifetime issues, and missing imports without linking.
      - name: Install Linux dependencies (for abigail-app check)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Check abigail-app compiles
        run: cargo check -p abigail-app

  # -- Tests (3-platform matrix) ----------------------------------------------
  test:
    name: Test (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux dependencies (Tauri 2 / Debian)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install cargo-llvm-cov (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        uses: taiki-e/install-action@cede0bb282aae847dfa8aacca3a41c86d973d4d7 # v2.68.1
        with:
          tool: cargo-llvm-cov

      - name: Run tests with coverage (ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: cargo llvm-cov --workspace --exclude abigail-app --lcov --output-path lcov.info

      - name: Run tests (non-ubuntu)
        if: matrix.platform != 'ubuntu-22.04'
        run: cargo test --workspace --exclude abigail-app

      - name: Upload Rust coverage to Codecov
        if: matrix.platform == 'ubuntu-22.04'
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5
        with:
          files: lcov.info
          flags: rust
          fail_ci_if_error: false

  # -- Frontend build --------------------------------------------------------
  frontend:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/src-ui/package-lock.json

      - name: Install and build frontend
        run: cd tauri-app/src-ui && npm ci && npm run build

      - name: Run frontend tests with coverage
        run: cd tauri-app/src-ui && npm run test:coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5
        with:
          files: tauri-app/src-ui/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  # -- Security audit (advisory) ----------------------------------------------
  audit:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0363 --ignore RUSTSEC-2024-0421

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/src-ui/package-lock.json

      - name: npm audit
        run: cd tauri-app/src-ui && npm ci && npm audit --audit-level=high

  # -- CodeQL static analysis -------------------------------------------------
  # Does not block gate when code scanning is not enabled for the repo.
  codeql:
    runs-on: ubuntu-22.04
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: "/language:javascript-typescript"

  # -- Gate (aggregator) -----------------------------------------------------
  # Requires lint, test, and frontend to succeed. Audit and CodeQL are
  # advisory (warn but don't block). This is the single required status
  # check for branch protection.
  gate:
    needs: [lint, test, frontend, audit, codeql]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Evaluate upstream results
        shell: bash
        run: |
          echo "lint:     ${{ needs.lint.result }}"
          echo "test:     ${{ needs.test.result }}"
          echo "frontend: ${{ needs.frontend.result }}"
          echo "audit:    ${{ needs.audit.result }}"
          echo "codeql:   ${{ needs.codeql.result }}"

          failed=false

          # Critical jobs -- must succeed
          for job in lint test frontend; do
            case "$job" in
              lint)     result="${{ needs.lint.result }}" ;;
              test)     result="${{ needs.test.result }}" ;;
              frontend) result="${{ needs.frontend.result }}" ;;
              *)        result="unknown" ;;
            esac
            if [[ "$result" != "success" ]]; then
              echo "::error::Required job '$job' did not succeed (result: $result)"
              failed=true
            fi
          done

          # Advisory jobs -- warn but don't block
          for job in audit codeql; do
            case "$job" in
              audit)  result="${{ needs.audit.result }}" ;;
              codeql) result="${{ needs.codeql.result }}" ;;
              *)      result="unknown" ;;
            esac
            if [[ "$result" != "success" ]]; then
              echo "::warning::Advisory job '$job' did not succeed (result: $result)"
            fi
          done

          if [[ "$failed" == "true" ]]; then
            echo "::error::One or more required jobs failed."
            exit 1
          fi

          echo "Gate passed -- all required jobs succeeded."
