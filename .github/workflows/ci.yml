# CI quality gate for pull requests.
#
# Runs lint, cross-platform tests, and frontend build in parallel.
# The gate job aggregates results: lint, test, frontend must pass;
# audit and codeql are advisory. Configure branch protection to require "gate".

name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -- Lint (fast) -----------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude abigail-app -- -D warnings

  # -- Tests (3-platform matrix) ---------------------------------------------
  test:
    name: Test (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --exclude abigail-app

  # -- Frontend build --------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tauri-app/src-ui/package-lock.json

      - name: Install dependencies
        working-directory: tauri-app/src-ui
        run: npm ci

      - name: Build frontend
        working-directory: tauri-app/src-ui
        run: npm run build

  # -- Security audit (advisory) --------------------------------------------
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: cargo audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tauri-app/src-ui/package-lock.json

      - name: npm audit
        run: cd tauri-app/src-ui && npm ci && npm audit --audit-level=high

  # -- Gate (aggregator) -----------------------------------------------------
  # Requires lint, test, and frontend to succeed. Audit is advisory.
  gate:
    needs: [lint, test, frontend, audit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate upstream results
        shell: bash
        run: |
          echo "lint:     ${{ needs.lint.result }}"
          echo "test:     ${{ needs.test.result }}"
          echo "frontend: ${{ needs.frontend.result }}"
          echo "audit:    ${{ needs.audit.result }}"

          failed=false

          # Critical jobs -- must succeed
          for job in lint test frontend; do
            result="${{ needs.lint.result }}"
            case "$job" in
              test)     result="${{ needs.test.result }}" ;;
              frontend) result="${{ needs.frontend.result }}" ;;
            esac
            if [[ "$result" != "success" ]]; then
              echo "::error::Required job '$job' did not succeed (result: $result)"
              failed=true
            fi
          done

          # Advisory jobs -- warn but don't block
          if [[ "${{ needs.audit.result }}" != "success" ]]; then
            echo "::warning::Advisory job 'audit' did not succeed (result: ${{ needs.audit.result }})"
          fi

          if [[ "$failed" == "true" ]]; then
            echo "::error::One or more required jobs failed."
            exit 1
          fi

          echo "Gate passed -- all required jobs succeeded."
