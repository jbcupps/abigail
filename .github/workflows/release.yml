# Build Abigail installers, publish GitHub Release, and publish npm package.
#
# Triggers:
#   - Tags matching 'v*' (e.g., v0.0.3)
#   - Manual workflow_dispatch with optional version input
#
# Stage 1: Parallel 3-platform builds (Windows, Ubuntu, macOS).
# Stage 2: Create GitHub Release + publish npm package.
#          Proceeds if at least one platform built successfully.
#
# Platforms: Windows (NSIS), Ubuntu (deb), macOS (dmg universal binary)

name: Release

env:
  OLLAMA_VERSION: "v0.5.13"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 0.0.3). Leave empty for auto-increment.'
        required: false
        type: string

permissions:
  contents: write

jobs:

  # -- Stage 1: Parallel platform builds -------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc
            installer_path: target/release/bundle/nsis/*.exe
            asset_name: Abigail-windows-x64-setup.exe
            asset_glob: "*.exe"
            keygen_bin: abigail-keygen.exe
            resource_name: abigail-keygen.exe
            ollama_bin: ollama.exe

          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu
            installer_path: target/release/bundle/deb/*.deb
            asset_name: Abigail-linux-x64.deb
            asset_glob: "*.deb"
            keygen_bin: abigail-keygen
            resource_name: abigail-keygen
            ollama_bin: ollama

          - platform: macos-latest
            args: "--target universal-apple-darwin"
            target: aarch64-apple-darwin,x86_64-apple-darwin
            installer_path: target/universal-apple-darwin/release/bundle/dmg/*.dmg
            asset_name: Abigail-macos-universal.dmg
            asset_glob: "*.dmg"
            keygen_bin: abigail-keygen
            resource_name: abigail-keygen
            ollama_bin: ollama

    runs-on: ${{ matrix.platform }}

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install nsis --no-progress -y

      - name: Install Linux dependencies (Tauri 2 / Debian)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/src-ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.release_version }}" ]]; then
            VERSION="${{ github.event.inputs.release_version }}"
            TAG="v${VERSION}"
          else
            git fetch --tags
            # Only consider clean semver tags (exclude -fast, -rc, etc.)
            LATEST=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
            if [[ -z "$LATEST" ]]; then
              VERSION="0.0.1"
            else
              LATEST_VER="${LATEST#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VER"
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (tag: $TAG)"

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          cd tauri-app
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            conf.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Disable beforeBuildCommand for CI
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const path = 'tauri-app/tauri.conf.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            data.build = data.build || {};
            data.build.beforeBuildCommand = '';
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
          "

      - name: Set platform-specific resources in tauri.conf.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const path = 'tauri-app/tauri.conf.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            data.bundle = data.bundle || {};
            data.bundle.resources = ['${{ matrix.resource_name }}', '${{ matrix.ollama_bin }}'];
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
          "

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Rust cache
        uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: "."
          shared-key: release-${{ matrix.platform }}

      - name: Install and build frontend
        run: |
          cd tauri-app/src-ui && npm ci && npm run build

      - name: Generate app icons
        run: |
          npm install -g @tauri-apps/cli@v2
          cd tauri-app && tauri icon icons/icon.png -o icons

      - name: Ensure icons at repo root (bundler cwd workaround)
        shell: bash
        run: |
          mkdir -p icons
          cp tauri-app/icons/icon.ico icons/ 2>/dev/null || true
          cp tauri-app/icons/icon.icns icons/ 2>/dev/null || true
          cp tauri-app/icons/*.png icons/ 2>/dev/null || true

      - name: Build abigail-keygen binary
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            cargo build --release -p abigail-keygen --target aarch64-apple-darwin
            cargo build --release -p abigail-keygen --target x86_64-apple-darwin
            lipo -create \
              target/aarch64-apple-darwin/release/abigail-keygen \
              target/x86_64-apple-darwin/release/abigail-keygen \
              -output tauri-app/abigail-keygen
          else
            cargo build --release -p abigail-keygen
            cp target/release/${{ matrix.keygen_bin }} tauri-app/${{ matrix.resource_name }}
          fi

      - name: Download bundled Ollama binary
        shell: bash
        run: |
          OLLAMA_BASE="https://github.com/ollama/ollama/releases/download/${{ env.OLLAMA_VERSION }}"
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            curl -fL -o /tmp/ollama.zip "${OLLAMA_BASE}/ollama-windows-amd64.zip"
            unzip -o -j /tmp/ollama.zip "ollama.exe" -d tauri-app/
          elif [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            curl -fL -o /tmp/ollama.tgz "${OLLAMA_BASE}/ollama-linux-amd64.tgz"
            tar xzf /tmp/ollama.tgz -C tauri-app/ --strip-components=1 bin/ollama
            chmod +x "tauri-app/${{ matrix.ollama_bin }}"
          elif [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            curl -fL -o /tmp/ollama.tgz "${OLLAMA_BASE}/ollama-darwin.tgz"
            tar xzf /tmp/ollama.tgz -C tauri-app/ ollama
            chmod +x "tauri-app/${{ matrix.ollama_bin }}"
          fi
          ls -la "tauri-app/${{ matrix.ollama_bin }}"
          # Validate binary is not a truncated download or error page
          FILE_SIZE=$(stat -c%s "tauri-app/${{ matrix.ollama_bin }}" 2>/dev/null || stat -f%z "tauri-app/${{ matrix.ollama_bin }}" 2>/dev/null)
          if [ "$FILE_SIZE" -lt 10000000 ]; then
            echo "ERROR: Downloaded Ollama binary is too small (${FILE_SIZE} bytes)"
            exit 1
          fi

      - name: Import Apple Developer ID certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "${APPLE_CERTIFICATE:-}" ]]; then
            echo "APPLE_CERTIFICATE not configured — skipping macOS code signing setup"
            exit 0
          fi

          # Decode the .p12 from base64
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add temporary keychain to the search list (prepend so it's found first)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify the identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          echo "Apple Developer ID certificate imported successfully"

      - name: Codesign bundled binaries (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]]; then
            echo "APPLE_SIGNING_IDENTITY not set — skipping codesign of bundled binaries"
            exit 0
          fi
          # Sign all bundled binaries with hardened runtime + secure timestamp
          # (required for Apple notarization of all binaries inside the .app bundle)
          for BIN_NAME in "${{ matrix.resource_name }}" "${{ matrix.ollama_bin }}"; do
            BIN_PATH="tauri-app/${BIN_NAME}"
            if [[ -f "$BIN_PATH" ]]; then
              echo "Codesigning $BIN_PATH with identity: $APPLE_SIGNING_IDENTITY"
              codesign --force --options runtime --timestamp \
                --sign "$APPLE_SIGNING_IDENTITY" "$BIN_PATH"
              echo "Verifying signature..."
              codesign --verify --verbose "$BIN_PATH"
            else
              echo "WARNING: $BIN_PATH not found — skipping codesign"
            fi
          done

      - name: Validate updater signing key preflight
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          bash scripts/validate_tauri_signing_key.sh

      - name: Build Tauri app
        shell: bash
        env:
          # TAURI_SIGNING_PRIVATE_KEY is set via GITHUB_ENV by the validation step above.
          # Only fall back to secrets if the validation step didn't run or didn't export.
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY || secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing (Tauri picks these up automatically)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd tauri-app

          if [[ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "Signing key detected: building signed artifacts"
            if [[ "${{ matrix.platform }}" == "macos-latest" && -n "${APPLE_CERTIFICATE:-}" ]]; then
              echo "Apple Developer ID certificate detected: code signing + notarization enabled"
            fi
            tauri build ${{ matrix.args }}
          else
            echo "WARNING: TAURI_SIGNING_PRIVATE_KEY is not configured; building unsigned artifacts"
            TAURI_SKIP_SIGNING=true tauri build ${{ matrix.args }}
          fi

      - name: Cleanup Apple keychain (macOS)
        if: always() && matrix.platform == 'macos-latest' && env.KEYCHAIN_PATH != ''
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Upload installers (Artifacts)
        uses: actions/upload-artifact@47309c993abb98030a35d55ef7ff34b7fa1074b5 # v4
        with:
          name: abigail-installer-${{ matrix.platform }}
          path: ${{ matrix.installer_path }}
          if-no-files-found: error

      - name: Upload MSI installer (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@47309c993abb98030a35d55ef7ff34b7fa1074b5 # v4
        with:
          name: abigail-msi-windows-latest
          path: target/release/bundle/msi/*.msi
          if-no-files-found: warn

  # -- Stage 2: Create GitHub Release + publish npm package -------------------
  publish:
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'failure')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Download all installer artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: abigail-installer-*
          merge-multiple: false
        continue-on-error: true

      - name: Download MSI artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: abigail-msi-*
          merge-multiple: false
        continue-on-error: true

      - name: Count downloaded installer artifacts
        id: artifacts
        shell: bash
        run: |
          if [ -d artifacts ]; then
            COUNT=$(find artifacts -type f | wc -l | tr -d ' ')
          else
            COUNT=0
          fi
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Discovered $COUNT downloaded artifact file(s)"

      - name: Create git tag if needed
        if: steps.artifacts.outputs.count != '0'
        shell: bash
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Rename to stable asset names for download URLs
        shell: bash
        run: |
          mkdir -p release-assets

          INSTALLER=$(find artifacts/abigail-installer-windows-latest -name "*.exe" -type f 2>/dev/null | head -1 || true)
          if [ -z "$INSTALLER" ]; then
            echo "WARNING: No Windows installer found in artifacts"
          else
            echo "Found Windows installer: $INSTALLER"
            cp "$INSTALLER" release-assets/Abigail-windows-x64-setup.exe
          fi

          MSI=$(find artifacts/abigail-msi-windows-latest -name "*.msi" -type f 2>/dev/null | head -1 || true)
          if [ -z "$MSI" ]; then
            echo "WARNING: No Windows MSI found in artifacts"
          else
            echo "Found Windows MSI: $MSI"
            cp "$MSI" release-assets/Abigail-windows-x64.msi
          fi

          DEB=$(find artifacts/abigail-installer-ubuntu-22.04 -name "*.deb" -type f 2>/dev/null | head -1 || true)
          if [ -z "$DEB" ]; then
            echo "WARNING: No Linux deb found in artifacts"
          else
            echo "Found Linux deb: $DEB"
            cp "$DEB" release-assets/Abigail-linux-x64.deb
          fi

          DMG=$(find artifacts/abigail-installer-macos-latest -name "*.dmg" -type f 2>/dev/null | head -1 || true)
          if [ -z "$DMG" ]; then
            echo "WARNING: No macOS dmg found in artifacts"
          else
            echo "Found macOS dmg: $DMG"
            cp "$DMG" release-assets/Abigail-macos-universal.dmg
          fi

          echo "Release assets:"
          ls -la release-assets/ 2>/dev/null || echo "No assets found"

      - name: Count release assets
        id: assets
        shell: bash
        run: |
          COUNT=$(find release-assets -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Discovered $COUNT release asset(s)"

      - name: Create GitHub Release
        if: steps.assets.outputs.count != '0'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: Abigail ${{ needs.build.outputs.tag }}
          draft: false
          prerelease: false
          body: |
            ## Abigail ${{ needs.build.outputs.tag }}

            ### Installation

            Download the installer for your platform:
            - **Windows**: `Abigail-windows-x64-setup.exe` (NSIS installer)
            - **Windows (MSI)**: `Abigail-windows-x64.msi` (Windows Installer)
            - **macOS**: `Abigail-macos-universal.dmg` (Intel + Apple Silicon)
            - **Linux**: `Abigail-linux-x64.deb` (Ubuntu 22.04+)

            Or install via npm:
            ```bash
            npx abigail-desktop install
            ```

            ### First Run Setup

            On first launch, Abigail will:
            1. Generate a signing keypair for verifying document integrity
            2. **Present your private key** — you MUST save this securely
            3. Run integrity checks and complete the birth sequence

            ### Security Note

            The private key shown during first run is NEVER stored by Abigail.
            Keep it safe — you will need it to verify your Abigail instance
            or recover from data loss.

            ### Platform Notes

            - **macOS**: The app is signed and notarized with a Developer ID certificate. If Gatekeeper still prompts, right-click → Open on first launch.
            - **Linux**: Requires `libwebkit2gtk-4.1-0` and `libayatana-appindicator3-1`. Ubuntu 22.04+ recommended.

            See [SECURITY_NOTES.md](https://github.com/${{ github.repository }}/blob/main/documents/SECURITY_NOTES.md) for details.
          files: |
            release-assets/*

      - name: Setup Node (for npm publish)
        if: steps.assets.outputs.count != '0'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Determine npm version
        if: steps.assets.outputs.count != '0'
        id: npm_version
        shell: bash
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "npm publish version: $VERSION"

      - name: Update npm package version
        if: steps.assets.outputs.count != '0'
        working-directory: npm-package
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.npm_version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        if: steps.assets.outputs.count != '0'
        working-directory: npm-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public || echo "WARNING: npm publish failed (token may not be configured)"
          echo "Published abigail-desktop@${{ steps.npm_version.outputs.version }} to npm"
