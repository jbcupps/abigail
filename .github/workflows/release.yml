# Build Abigail installers, publish GitHub Release, and publish npm package.
#
# Triggers:
#   - Tags matching 'v*' (e.g., v0.1.0)
#   - Manual workflow_dispatch with version input
#
# Stage 1 (create-release): Create a draft GitHub Release.
# Stage 2 (build-tauri):    Parallel 3-platform Tauri builds that upload
#                            installers directly to the draft release.
# Stage 3 (publish-npm):    Publish the npm wrapper package.
# Stage 4 (finalize):       Mark the release as non-draft.
#
# Platforms: Windows (NSIS .exe + .msi), macOS (.dmg universal), Linux (.deb + .AppImage)

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:

  # -- Stage 1: Create draft release ----------------------------------------
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
          else
            # Auto-increment: find latest v* tag and bump patch
            git fetch --tags
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
            if [[ -z "$LATEST" ]]; then
              VERSION="0.0.1"
            else
              LATEST_VER="${LATEST#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VER"
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION (tag: $TAG)"

      - name: Create git tag if needed
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Create draft GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Abigail ${{ steps.version.outputs.tag }}
          draft: true
          prerelease: false
          body: |
            ## Abigail ${{ steps.version.outputs.tag }}

            ### Installation

            Download the installer for your platform:
            - **Windows**: `Abigail-windows-x64-setup.exe` (NSIS installer)
            - **macOS**: `Abigail-macos-universal.dmg` (Intel + Apple Silicon)
            - **Linux**: `Abigail-linux-x64.deb` (Ubuntu 22.04+)

            Or install via npm:
            ```bash
            npm install -g abigail-desktop
            ```

            ### First Run Setup

            On first launch, Abigail will:
            1. Generate a signing keypair for verifying document integrity
            2. **Present your private key** -- you MUST save this securely
            3. Run integrity checks and complete the birth sequence

            ### Security Note

            The private key shown during first run is NEVER stored by Abigail.
            Keep it safe -- you will need it to verify your Abigail instance
            or recover from data loss.

            ### Platform Notes

            - **macOS**: The app is not notarized. Right-click then Open on first launch to bypass Gatekeeper.
            - **Linux**: Requires `libwebkit2gtk-4.1-0` and `libayatana-appindicator3-1`. Ubuntu 22.04+ recommended.

  # -- Stage 2: Cross-platform Tauri builds ---------------------------------
  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc
            keygen_bin: abigail-keygen.exe
            resource_name: abigail-keygen.exe

          - platform: ubuntu-latest
            args: ""
            target: x86_64-unknown-linux-gnu
            keygen_bin: abigail-keygen
            resource_name: abigail-keygen

          - platform: macos-latest
            args: "--target universal-apple-darwin"
            target: aarch64-apple-darwin,x86_64-apple-darwin
            keygen_bin: abigail-keygen
            resource_name: abigail-keygen

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis --no-progress -y

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tauri-app/src-ui/package-lock.json

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          cd tauri-app
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            conf.version = '${{ needs.create-release.outputs.version }}';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Set platform-specific resources in tauri.conf.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const path = 'tauri-app/tauri.conf.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            data.bundle = data.bundle || {};
            data.bundle.resources = ['${{ matrix.resource_name }}'];
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
          "

      - name: Install and build frontend
        working-directory: tauri-app/src-ui
        run: |
          npm ci
          npm run build

      - name: Generate app icons
        run: |
          npm install -g @tauri-apps/cli@v2
          cd tauri-app && tauri icon icons/icon.png -o icons

      - name: Ensure icons at repo root (bundler cwd workaround)
        shell: bash
        run: |
          mkdir -p icons
          cp tauri-app/icons/icon.ico icons/ 2>/dev/null || true
          cp tauri-app/icons/icon.icns icons/ 2>/dev/null || true
          cp tauri-app/icons/*.png icons/ 2>/dev/null || true

      - name: Build abigail-keygen binary
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            cargo build --release -p abigail-keygen --target aarch64-apple-darwin
            cargo build --release -p abigail-keygen --target x86_64-apple-darwin
            lipo -create \
              target/aarch64-apple-darwin/release/abigail-keygen \
              target/x86_64-apple-darwin/release/abigail-keygen \
              -output tauri-app/abigail-keygen
          else
            cargo build --release -p abigail-keygen
            cp target/release/${{ matrix.keygen_bin }} tauri-app/${{ matrix.resource_name }}
          fi

      - name: Build Tauri app and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tauriScript: cargo tauri
          args: ${{ matrix.args }}

  # -- Stage 3: Publish npm package ------------------------------------------
  publish-npm:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm package version
        working-directory: npm-package
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.create-release.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        working-directory: npm-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public
          echo "Published abigail-desktop@${{ needs.create-release.outputs.version }} to npm"

  # -- Stage 4: Finalize release (mark non-draft) ---------------------------
  finalize-release:
    needs: [create-release, build-tauri, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as non-draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X PATCH \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }}" \
            -d '{"draft": false}'
          echo "Release ${{ needs.create-release.outputs.tag }} is now published."
