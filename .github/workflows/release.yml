# Build AO installers, publish GitHub Release, and publish npm package.
#
# Triggers:
# - Tags matching 'v*' (e.g., v0.0.3)
# - Manual workflow_dispatch with optional version input
#
# Stage 1: Parallel 3-platform builds (Windows, Ubuntu, macOS).
# Stage 2: Create GitHub Release + publish npm package.
#          Proceeds if at least one platform built successfully.
#
# Platforms: Windows (NSIS), Ubuntu (deb), macOS (dmg universal binary)

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g. 0.0.3). Leave empty for auto-increment.'
        required: false
        type: string

permissions:
  contents: write

# ---------------------------------------------------------------------------
# Stage 1: Parallel platform builds
# ---------------------------------------------------------------------------

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc
            installer_path: target/release/bundle/nsis/*.exe
            asset_name: AO-windows-x64-setup.exe
            asset_glob: "*.exe"
            keygen_bin: ao-keygen.exe
            resource_name: ao-keygen.exe

          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu
            installer_path: target/release/bundle/deb/*.deb
            asset_name: AO-linux-x64.deb
            asset_glob: "*.deb"
            keygen_bin: ao-keygen
            resource_name: ao-keygen

          - platform: macos-latest
            args: "--target universal-apple-darwin"
            target: aarch64-apple-darwin,x86_64-apple-darwin
            installer_path: target/universal-apple-darwin/release/bundle/dmg/*.dmg
            asset_name: AO-macos-universal.dmg
            asset_glob: "*.dmg"
            keygen_bin: ao-keygen
            resource_name: ao-keygen

    runs-on: ${{ matrix.platform }}

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      # ── Platform-specific system dependencies ──────────────────────────

      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install nsis --no-progress -y

      - name: Install Linux dependencies (Tauri 2 / Debian)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      # ── Toolchains ────────────────────────────────────────────────────

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tauri-app/src-ui/package.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # ── Version determination ─────────────────────────────────────────

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Explicit tag push
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.release_version }}" ]]; then
            # Manual dispatch with explicit version
            VERSION="${{ github.event.inputs.release_version }}"
            TAG="v${VERSION}"
          else
            # Auto-increment: find latest v* tag and bump patch
            git fetch --tags
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
            if [[ -z "$LATEST" ]]; then
              VERSION="0.0.1"
            else
              LATEST_VER="${LATEST#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VER"
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (tag: $TAG)"

      # ── Tauri config patching ─────────────────────────────────────────

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          cd tauri-app
          if command -v jq &> /dev/null; then
            jq '.version = "${{ steps.version.outputs.version }}"' tauri.conf.json > tauri.conf.json.tmp
            mv tauri.conf.json.tmp tauri.conf.json
          else
            sed -i.bak 's/"version": "[^"]*"/"version": "${{ steps.version.outputs.version }}"/' tauri.conf.json
            rm -f tauri.conf.json.bak
          fi
          cat tauri.conf.json | head -10

      - name: Disable beforeBuildCommand for CI
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'tauri-app/tauri.conf.json';
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          data.build = data.build || {};
          data.build.beforeBuildCommand = "";
          fs.writeFileSync(path, JSON.stringify(data, null, 2) + "\n");
          NODE

      - name: Set platform-specific resources in tauri.conf.json
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'tauri-app/tauri.conf.json';
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          data.bundle = data.bundle || {};
          data.bundle.resources = ["${{ matrix.resource_name }}"];
          fs.writeFileSync(path, JSON.stringify(data, null, 2) + "\n");
          NODE

      # ── Build ─────────────────────────────────────────────────────────

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Rust cache
        uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: "."

      - name: Install and build frontend
        run: |
          cd tauri-app/src-ui && npm install && npm run build

      - name: Generate app icons
        run: |
          npm install -g @tauri-apps/cli@v2
          cd tauri-app && tauri icon icons/icon.png -o icons

      - name: Ensure icons at repo root (bundler cwd workaround)
        shell: bash
        run: |
          mkdir -p icons
          cp tauri-app/icons/icon.ico icons/ 2>/dev/null || true
          cp tauri-app/icons/icon.icns icons/ 2>/dev/null || true
          cp tauri-app/icons/*.png icons/ 2>/dev/null || true

      - name: Build ao-keygen binary
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            cargo build --release -p ao-keygen --target aarch64-apple-darwin
            cargo build --release -p ao-keygen --target x86_64-apple-darwin
            lipo -create \
              target/aarch64-apple-darwin/release/ao-keygen \
              target/x86_64-apple-darwin/release/ao-keygen \
              -output tauri-app/ao-keygen
          else
            cargo build --release -p ao-keygen
            cp target/release/${{ matrix.keygen_bin }} tauri-app/${{ matrix.resource_name }}
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@063c0231f444e55760d98acb9c469b994269d4a5 # v0.5.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          args: ${{ matrix.args }}

      - name: Upload installers (Artifacts)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ao-installer-${{ matrix.platform }}
          path: ${{ matrix.installer_path }}
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Stage 2: Create GitHub Release + publish npm package
  #          Runs when build stage finishes; uses whatever artifacts exist.
  # -------------------------------------------------------------------------

  publish:
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'failure')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Download all installer artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: ao-installer-*
          merge-multiple: false

      - name: Create git tag if needed
        shell: bash
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Rename to stable asset names for download URLs
        shell: bash
        run: |
          mkdir -p release-assets

          # Windows
          INSTALLER=$(find artifacts/ao-installer-windows-latest -name "*.exe" -type f 2>/dev/null | head -1 || true)
          if [ -z "$INSTALLER" ]; then
            echo "WARNING: No Windows installer found in artifacts"
          else
            echo "Found Windows installer: $INSTALLER"
            cp "$INSTALLER" release-assets/AO-windows-x64-setup.exe
          fi

          # Linux
          DEB=$(find artifacts/ao-installer-ubuntu-22.04 -name "*.deb" -type f 2>/dev/null | head -1 || true)
          if [ -z "$DEB" ]; then
            echo "WARNING: No Linux deb found in artifacts"
          else
            echo "Found Linux deb: $DEB"
            cp "$DEB" release-assets/AO-linux-x64.deb
          fi

          # macOS
          DMG=$(find artifacts/ao-installer-macos-latest -name "*.dmg" -type f 2>/dev/null | head -1 || true)
          if [ -z "$DMG" ]; then
            echo "WARNING: No macOS dmg found in artifacts"
          else
            echo "Found macOS dmg: $DMG"
            cp "$DMG" release-assets/AO-macos-universal.dmg
          fi

          echo "Release assets:"
          ls -la release-assets/ || echo "No assets found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: AO ${{ needs.build.outputs.tag }}
          draft: false
          prerelease: false
          body: |
            ## AO ${{ needs.build.outputs.tag }}

            ### Installation

            Download the installer for your platform:
            - **Windows**: `AO-windows-x64-setup.exe`
            - **macOS**: `AO-macos-universal.dmg` (Intel + Apple Silicon)
            - **Linux**: `AO-linux-x64.deb` (Ubuntu 22.04+)

            Or install via npm:
            ```bash
            npx ao-desktop install
            ```

            ### First Run Setup

            On first launch, AO will:
            1. Generate a signing keypair for verifying document integrity
            2. **Present your private key** - you MUST save this securely
            3. Run integrity checks and complete the birth sequence

            ### Security Note

            The private key shown during first run is NEVER stored by AO.
            Keep it safe - you'll need it if you ever need to verify your AO instance
            or recover from data loss.

            ### Platform Notes

            - **macOS**: The app is not notarized. You may need to right-click then Open on first launch to bypass Gatekeeper.
            - **Linux**: Requires `libwebkit2gtk-4.1-0` and `libayatana-appindicator3-1`. Ubuntu 22.04+ recommended.

            See [SECURITY_NOTES.md](https://github.com/${{ github.repository }}/blob/main/documents/SECURITY_NOTES.md) for details.
          files: |
            release-assets/*

      # ── npm publish ───────────────────────────────────────────────────

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Determine npm version
        id: npm_version
        shell: bash
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "npm publish version: $VERSION"

      - name: Update npm package version
        working-directory: npm-package
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.npm_version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        working-directory: npm-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public || echo "WARNING: npm publish failed (token may not be configured)"
          echo "Published ao-desktop@${{ steps.npm_version.outputs.version }} to npm"
