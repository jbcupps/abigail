# Build verification on push to main.
#
# Runs a full release build (cargo build --release) across all 3 platforms
# and uploads the resulting binaries as artifacts.

name: Build

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tauri-app/src-ui/package-lock.json

      - name: Install and build frontend
        working-directory: tauri-app/src-ui
        run: |
          npm ci
          npm run build

      - name: Build release
        run: cargo build --release --workspace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: abigail-build-${{ matrix.platform }}
          path: |
            target/release/abigail*
            !target/release/abigail*.d
            !target/release/.fingerprint
          retention-days: 7
          if-no-files-found: warn
