<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Abby — Download</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 36rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { color: #374151; margin: 0.75rem 0; }
    .cta { display: inline-block; margin: 1rem 0; padding: 0.75rem 1.5rem; background: #2563eb; color: white; text-decoration: none; border-radius: 0.5rem; font-weight: 600; }
    .cta:hover { background: #1d4ed8; }
    .others { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e5e7eb; }
    .others h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .others ul { list-style: none; padding: 0; margin: 0; }
    .others li { margin: 0.25rem 0; }
    .others a { color: #2563eb; text-decoration: none; }
    .others a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Abby</h1>
  <p>Desktop agent. Pick your platform and download; run the installer when the download finishes.</p>
  <p><a id="main-download" class="cta" href="#">Download for your system</a></p>
  <div class="others">
    <h2>Other downloads</h2>
    <ul>
      <li><a href="https://github.com/jbcupps/abby/releases/latest/download/Abby-windows-x64-setup.exe">Windows (x64)</a> — .exe installer</li>
      <li><a href="https://github.com/jbcupps/abby/releases/latest/download/Abby-macos-x64.dmg">macOS (x64)</a> — .dmg</li>
      <li><a href="https://github.com/jbcupps/abby/releases/latest/download/Abby-linux-x64.deb">Linux (x64)</a> — .deb</li>
    </ul>
  </div>
  <script>
    (function () {
      var BASE = 'https://github.com/jbcupps/abby/releases/latest/download/';
      var links = {
        windows: { url: BASE + 'Abby-windows-x64-setup.exe', label: 'Download for Windows' },
        macos:   { url: BASE + 'Abby-macos-x64.dmg',   label: 'Download for macOS' },
        linux:   { url: BASE + 'Abby-linux-x64.deb',   label: 'Download for Linux' }
      };
      var os = 'linux';
      var ua = navigator.userAgent || '';
      var platform = (navigator.platform || '').toLowerCase();
      if (ua.indexOf('Win') !== -1 || platform.indexOf('win') !== -1) os = 'windows';
      else if (ua.indexOf('Mac') !== -1 || platform.indexOf('mac') !== -1) os = 'macos';
      else if (ua.indexOf('Linux') !== -1 || platform.indexOf('linux') !== -1) os = 'linux';
      var info = links[os];
      var el = document.getElementById('main-download');
      el.textContent = info.label;
      el.href = info.url;
    })();
  </script>
</body>
</html>
