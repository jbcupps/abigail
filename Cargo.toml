[workspace]
resolver = "2"
members = [
    "crates/abigail-core",
    "crates/abigail-memory",
    "crates/abigail-capabilities",
    "crates/abigail-router",
    "crates/abigail-birth",
    "crates/abigail-skills",
    "crates/abigail-keygen",
    "skills/skill-web-search",
    "skills/skill-filesystem",
    "skills/skill-shell",
    "skills/skill-http",
    "skills/skill-perplexity-search",
    "tauri-app",
]

[workspace.package]
version = "0.0.1"
edition = "2021"
authors = ["Abigail's Mentor"]
license = "MIT"

[workspace.dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
rand = "0.8"
base64 = "0.21"
rusqlite = { version = "0.31", features = ["bundled", "blob"] }
thiserror = "2.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }
tokio-util = { version = "0.7", features = ["io", "compat"] }
